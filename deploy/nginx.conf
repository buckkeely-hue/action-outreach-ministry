server {
    listen 80;
    server_name actionoutreachministry.com www.actionoutreachministry.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name actionoutreachministry.com www.actionoutreachministry.com;

    ssl_certificate     /etc/letsencrypt/live/actionoutreachministry.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/actionoutreachministry.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_request_buffering off;
    }
}
